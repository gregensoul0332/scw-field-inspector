<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCW Field Inspector</title>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
:root {
  --navy:     #1F4A7D;
  --navy-dk:  #163760;
  --lt-blue:  #DAE3F3;
  --green:    #2e7d32;
  --amber:    #e65100;
  --red:      #c62828;
  --gray:     #dde2ea;
  --gray-mid: #999;
  --text:     #1a1f2e;
  --text-muted:#6b7280;
  --bg:       #f0f3f8;
  --white:    #ffffff;
  --font:     'Segoe UI', system-ui, sans-serif;
  --mono:     'Consolas', 'Cascadia Code', monospace;
  --radius:   4px;
  --shadow:   0 2px 8px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* ── HEADER ── */
.app-header{background:var(--navy);color:white;display:flex;align-items:center;gap:12px;padding:0 16px;height:44px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,0.25);}
.app-header .logo{font-size:12px;font-weight:700;letter-spacing:1.5px;opacity:0.9;}
.app-header .title{font-size:13px;font-weight:700;letter-spacing:0.5px;}
.app-header .sep{opacity:0.3;font-size:16px;}
#statusBar{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;opacity:0.85;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#999;flex-shrink:0;}
.status-dot.connected{background:#4caf50;box-shadow:0 0 0 2px rgba(76,175,80,0.3);}
.status-dot.error{background:#ef5350;}

/* ── LOGIN ── */
#loginScreen{display:flex;flex:1;align-items:center;justify-content:center;}
.login-card{background:white;border-radius:8px;box-shadow:var(--shadow);padding:40px;text-align:center;width:320px;}
.login-card h2{color:var(--navy);font-size:18px;margin-bottom:6px;}
.login-card p{color:var(--text-muted);font-size:12px;margin-bottom:24px;}
.btn-login{background:var(--navy);color:white;border:none;padding:10px 28px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;width:100%;}
.btn-login:hover{background:var(--navy-dk);}
#loginError{color:var(--red);font-size:11px;margin-top:10px;min-height:16px;}

/* ── MAIN ── */
#mainApp{display:none;flex:1;flex-direction:column;overflow:hidden;}
.toolbar{background:white;border-bottom:1px solid var(--gray);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.toolbar-label{font-size:10px;font-weight:700;color:var(--navy);letter-spacing:0.8px;}
#listSelect{height:30px;font-size:12px;border:1px solid #c0c8d4;border-radius:var(--radius);padding:0 8px;font-family:var(--font);min-width:240px;background:white;}
.btn{font-family:var(--font);font-size:12px;font-weight:600;border-radius:var(--radius);cursor:pointer;padding:0 14px;height:30px;border:1px solid transparent;transition:background 0.12s;}
.btn-primary{background:var(--navy);color:white;}
.btn-primary:hover{background:var(--navy-dk);}
.btn-ghost{background:white;color:var(--navy);border-color:#c0c8d4;}
.btn-ghost:hover{background:var(--lt-blue);}
.btn-sm{font-size:10px;padding:0 8px;height:22px;}
#searchBox{height:30px;font-size:12px;border:1px solid #c0c8d4;border-radius:var(--radius);padding:0 8px;font-family:var(--font);width:200px;}
#resultMeta{font-size:11px;color:var(--text-muted);margin-left:auto;}

/* ── TOGGLE ── */
.filter-group{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);}
.filter-group input[type=checkbox]{accent-color:var(--navy);width:13px;height:13px;}

/* ── TABLE ── */
.table-wrap{flex:1;overflow:auto;padding:0;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--navy);color:white;padding:7px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:0.8px;position:sticky;top:0;white-space:nowrap;z-index:10;}
tbody tr{border-bottom:1px solid var(--gray);}
tbody tr:hover{background:#f5f8fc;}
tbody td{padding:5px 10px;vertical-align:middle;}
.td-internal{font-family:var(--mono);font-size:11px;color:var(--navy);font-weight:600;}
.td-display{font-size:12px;}
.td-type{font-size:11px;color:var(--text-muted);}
.td-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:0.3px;}
.badge-req{background:#fff3e0;color:var(--amber);}
.badge-ro{background:#f5f5f5;color:#999;}
.badge-hidden{background:#ffebee;color:var(--red);}
.copy-btn{font-family:var(--mono);font-size:10px;background:#f0f3f8;border:1px solid #dde2ea;border-radius:3px;padding:1px 6px;cursor:pointer;color:var(--navy);transition:background 0.1s;}
.copy-btn:hover{background:var(--lt-blue);}
.copy-btn.copied{background:#e8f5e9;color:var(--green);border-color:#a5d6a7;}

/* ── EMPTY / LOADING ── */
.state-row td{text-align:center;padding:40px;color:var(--text-muted);font-style:italic;}
.spinner-inline{display:inline-block;width:14px;height:14px;border:2px solid #c0c8d4;border-top-color:var(--navy);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="app-header">
  <span class="logo">SCW</span>
  <span class="sep">|</span>
  <span class="title">FIELD INSPECTOR</span>
  <div id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Signing in...</span>
  </div>
</div>

<div id="loginScreen">
  <div class="login-card">
    <h2>SCW Field Inspector</h2>
    <p>Sign in with your Microsoft 365 account to inspect SharePoint list field names.</p>
    <button class="btn-login" onclick="signIn()">Sign In</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="mainApp" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
  <div class="toolbar">
    <span class="toolbar-label">LIST</span>
    <select id="listSelect" onchange="onListChange()">
      <option value="">— Select a list —</option>
    </select>
    <button class="btn btn-primary" onclick="loadFields()">Inspect</button>
    <input type="text" id="searchBox" placeholder="Filter fields..." oninput="filterTable()">
    <div class="filter-group">
      <input type="checkbox" id="hideReadOnly" onchange="filterTable()">
      <label for="hideReadOnly">Hide read-only</label>
    </div>
    <div class="filter-group">
      <input type="checkbox" id="hideHidden" checked onchange="filterTable()">
      <label for="hideHidden">Hide hidden</label>
    </div>
    <button class="btn btn-ghost" onclick="exportCSV()" id="btnExport" style="display:none">Export CSV</button>
    <span id="resultMeta"></span>
  </div>
  <div class="table-wrap">
    <table id="fieldsTable">
      <thead>
        <tr>
          <th style="width:280px">Internal Name</th>
          <th>Display Name</th>
          <th style="width:140px">Type</th>
          <th style="width:90px">Flags</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
      <tbody id="fieldsTbody">
        <tr class="state-row"><td colspan="5">Select a list and click Inspect</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const TENANT_ID = 'a96e5f0b-8768-4736-8a66-1a7d41450f19';
const CLIENT_ID = 'dd8d2db6-a9d2-400f-af12-3b1d0c52545c';
const SITE      = 'https://mideast.sharepoint.com/sites/SCWQMS';
const SP_SCOPE  = 'https://mideast.sharepoint.com/AllSites.Write';

let msalInstance = null;
let spToken      = null;
let allFields    = []; // raw field data for current list

/* ── AUTH ── */
async function initAuth() {
  const cfg = {
    auth: { clientId: CLIENT_ID, authority: `https://login.microsoftonline.com/${TENANT_ID}` },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
  };
  msalInstance = new msal.PublicClientApplication(cfg);
  await msalInstance.initialize();
  try {
    const resp = await msalInstance.handleRedirectPromise();
    if (resp) { spToken = resp.accessToken; showApp(resp.account); return; }
  } catch(e) { console.warn(e); }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      const r = await msalInstance.acquireTokenSilent({ scopes:[SP_SCOPE], account:accounts[0] });
      spToken = r.accessToken; showApp(accounts[0]); return;
    } catch(e) {}
  }
  document.getElementById('loginScreen').style.display = 'flex';
  setStatus('', 'Not signed in');
}

async function signIn() {
  document.getElementById('loginError').textContent = '';
  try { await msalInstance.loginRedirect({ scopes:[SP_SCOPE] }); }
  catch(e) { document.getElementById('loginError').textContent = 'Sign-in failed: ' + e.message; }
}

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error('Not signed in');
  const r = await msalInstance.acquireTokenSilent({ scopes:[SP_SCOPE], account:accounts[0] });
  return r.accessToken;
}

function showApp(account) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display    = 'flex';
  const name = account.name || account.username;
  setStatus('connected', `Connected \u2022 ${name}`);
  loadListNames();
}

function setStatus(type, msg) {
  const dot  = document.getElementById('statusDot');
  dot.className = 'status-dot' + (type==='connected'?' connected':type==='error'?' error':'');
  document.getElementById('statusText').textContent = msg;
}

/* ── LISTS ── */
async function loadListNames() {
  try {
    const token = await getToken();
    const res = await fetch(
      `${SITE}/_api/web/lists?$select=Title&$filter=Hidden eq false and BaseTemplate eq 100&$orderby=Title`,
      { headers: { Accept:'application/json;odata=nometadata', Authorization:`Bearer ${token}` } }
    );
    const json = await res.json();
    const lists = json.value || [];
    const sel = document.getElementById('listSelect');
    sel.innerHTML = '<option value="">— Select a list —</option>';
    lists.forEach(l => {
      const o = document.createElement('option');
      o.value = l.Title; o.textContent = l.Title;
      sel.appendChild(o);
    });
  } catch(e) { setStatus('error', 'Could not load lists: ' + e.message); }
}

function onListChange() {
  const v = document.getElementById('listSelect').value;
  if (v) loadFields();
}

/* ── FIELDS ── */
async function loadFields() {
  const listName = document.getElementById('listSelect').value;
  if (!listName) { showToast('Select a list first', 'warn'); return; }

  const tbody = document.getElementById('fieldsTbody');
  tbody.innerHTML = `<tr class="state-row"><td colspan="5"><span class="spinner-inline"></span>Loading fields for <strong>${listName}</strong>…</td></tr>`;
  document.getElementById('btnExport').style.display = 'none';
  document.getElementById('resultMeta').textContent = '';
  allFields = [];

  try {
    const token = await getToken();
    const res = await fetch(
      `${SITE}/_api/web/lists/getbytitle('${encodeURIComponent(listName)}')/fields?$select=InternalName,Title,TypeAsString,Required,ReadOnlyField,Hidden,Choices&$orderby=InternalName`,
      { headers: { Accept:'application/json;odata=nometadata', Authorization:`Bearer ${token}` } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    allFields = (json.value || []);
    filterTable();
    document.getElementById('btnExport').style.display = '';
  } catch(e) {
    tbody.innerHTML = `<tr class="state-row"><td colspan="5" style="color:var(--red)">Error: ${e.message}</td></tr>`;
  }
}

function filterTable() {
  const q          = document.getElementById('searchBox').value.toLowerCase();
  const hideRO     = document.getElementById('hideReadOnly').checked;
  const hideHidden = document.getElementById('hideHidden').checked;

  const filtered = allFields.filter(f => {
    if (hideHidden && f.Hidden)      return false;
    if (hideRO    && f.ReadOnlyField) return false;
    if (q && !f.InternalName.toLowerCase().includes(q) && !f.Title.toLowerCase().includes(q) && !f.TypeAsString.toLowerCase().includes(q)) return false;
    return true;
  });

  const tbody = document.getElementById('fieldsTbody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr class="state-row"><td colspan="5">No fields match</td></tr>`;
    document.getElementById('resultMeta').textContent = '';
    return;
  }

  tbody.innerHTML = filtered.map(f => {
    const flags = [];
    if (f.Required)      flags.push(`<span class="td-badge badge-req">Required</span>`);
    if (f.ReadOnlyField) flags.push(`<span class="td-badge badge-ro">Read-only</span>`);
    if (f.Hidden)        flags.push(`<span class="td-badge badge-hidden">Hidden</span>`);
    const choiceHint = f.Choices && f.Choices.length
      ? `<div style="font-size:10px;color:var(--text-muted);margin-top:2px">${f.Choices.join(' · ')}</div>` : '';
    return `<tr>
      <td class="td-internal">${esc(f.InternalName)}</td>
      <td class="td-display">${esc(f.Title)}${choiceHint}</td>
      <td class="td-type">${esc(f.TypeAsString)}</td>
      <td>${flags.join(' ')}</td>
      <td><button class="copy-btn" onclick="copyField('${esc(f.InternalName)}', this)">${esc(f.InternalName)}</button></td>
    </tr>`;
  }).join('');

  document.getElementById('resultMeta').textContent =
    `${filtered.length} field${filtered.length!==1?'s':''} · ${allFields.length} total`;
}

function copyField(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = text; btn.classList.remove('copied'); }, 1500);
  });
}

function exportCSV() {
  const listName = document.getElementById('listSelect').value;
  const hideRO   = document.getElementById('hideReadOnly').checked;
  const hideH    = document.getElementById('hideHidden').checked;
  const rows = allFields
    .filter(f => !(hideH && f.Hidden) && !(hideRO && f.ReadOnlyField))
    .map(f => [
      `"${f.InternalName}"`,
      `"${f.Title}"`,
      `"${f.TypeAsString}"`,
      f.Required?'Yes':'No',
      f.ReadOnlyField?'Yes':'No',
      f.Hidden?'Yes':'No',
      f.Choices?`"${f.Choices.join('; ')}"`:'""'
    ].join(','));
  const csv = 'Internal Name,Display Name,Type,Required,Read-Only,Hidden,Choices\n' + rows.join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `SCW_${listName.replace(/\s+/g,'_')}_Fields.csv`;
  a.click();
}

/* ── UTILS ── */
function esc(v) { return String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── BOOT ── */
document.addEventListener('DOMContentLoaded', initAuth);
</script>
</body>
</html>
